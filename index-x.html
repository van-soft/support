<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen24</title>
<style>
  :root { --ink:#1e1f24; --muted:#5b6070; --accent:#2c3da4; --bg:#eef2f9; --card:#ffffff; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    background: var(--card); border-radius: 24px; padding: 46px 40px; text-align: center;
    box-shadow: 0 12px 44px rgba(20,30,80,.08); max-width: 420px; margin: 22px;
  }
  h1 { font-size: 40px; margin: 0 0 6px; color: var(--accent); letter-spacing: -.02em; }
  p { color: var(--muted); margin: 0 0 26px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  a {
    display: block; text-decoration: none; color: var(--accent); font-weight: 600;
    padding: 14px 18px; border-radius: 14px; background: rgba(44,61,164,.08);
  }
  a:hover { background: rgba(44,61,164,.14); }
  .foot { color: var(--muted); font-size: 13px; margin-top: 24px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Zen24</h1>
    <p>Make 24 · calm mental math</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <div class="foot">© 2026 Zen24. All rights reserved.</div>
  </div>
</body>
</html>
